<html>
    <head>
        <!--<link data-trunk rel="scss" href="path/to/index.scss" />-->
        <link
            data-trunk
            rel="rust"
            data-wasm-opt-params="--enable-bulk-memory-opt --enable-nontrapping-float-to-int --enable-threads"
        />
    </head>
    <body style="margin: 0">
        <main style="width: 100vw; height: 100vh; background-color: black">
            <canvas id="bevy-canvas" />
        </main>
    </body>
    <script>
        const htmlCanvas = document.querySelector("#bevy-canvas");

        window.addEventListener("resize", resizeCanvas, false);
        resizeCanvas();

        function resizeCanvas() {
            htmlCanvas.style = "position: absolute; top: 0; left: 0;";
            htmlCanvas.width = window.innerWidth;
            htmlCanvas.height = window.innerHeight;
        }
    </script>
</html>
